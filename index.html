<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Athletics Lineup Rotator</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                background: linear-gradient(135deg, #1B5E20, #2E7D32);
                color: #fff;
                font-family: 'Segoe UI', sans-serif;
                padding: 20px 0;
                margin: 0;
            }

            .container {
                max-width: 900px;
                background: rgba(0, 0, 0, 0.85);
                padding: 20px;
                border-radius: 16px;
                box-shadow: 0 6px 24px rgba(218, 165, 32, 0.5);
            }

            h1 {
                color: #FFD700;
                font-size: 2rem;
                font-weight: bold;
                margin-bottom: 10px;
                text-shadow: 2px 2px 8px #1B5E20;
            }

            .btn {
                margin: 0 10px 10px 0;
                padding: 8px 16px;
                font-size: 0.9rem;
                border-radius: 8px;
                transition: all 0.3s ease;
            }

            .btn-primary {
                background: #DAA520;
                border: none;
                color: #fff;
            }

            .btn-primary:hover {
                background: #B8860B;
            }

            .btn-success {
                background: #FFD700;
                color: #1B5E20;
                border: none;
            }

            .btn-success:hover {
                background: #DAA520;
                color: #fff;
            }

            .btn-outline-light {
                border: 2px solid #fff;
                color: #fff;
            }

            .btn-outline-light:hover {
                background: #fff;
                color: #1B5E20;
            }

            .form-select {
                background-color: rgba(255, 215, 0, 0.1);
                color: #FFD700;
                border: 2px solid #DAA520;
                padding: 8px 16px;
                border-radius: 8px;
                font-size: 0.9rem;
            }

            .form-select:focus {
                background-color: rgba(255, 215, 0, 0.2);
                border-color: #FFD700;
                color: #FFD700;
                box-shadow: 0 0 0 0.2rem rgba(218, 165, 32, 0.25);
            }

            .form-select option {
                background-color: #1B5E20;
                color: #FFD700;
            }

            .innings-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-top: 20px;
            }

            table {
                width: 100%;
                font-size: 0.7rem;
                color: #fff;
                border-radius: 8px;
                overflow: hidden;
                background: #1B5E20;
                box-shadow: 0 4px 10px rgba(218, 165, 32, 0.3);
            }

            thead {
                background: #DAA520;
                color: #fff;
            }

            td,
            th {
                text-align: center;
                padding: 4px;
                border: 1px solid #FFD700;
            }

            td {
                background: rgba(255, 255, 255, 0.07);
            }

            th {
                font-weight: bold;
            }

            .draggable-player {
                cursor: grab;
                user-select: none;
            }

            td[contenteditable="true"],
            td[contenteditable="true"]:focus {
                outline: 2px solid #DAA520;
                background: #fff;
                color: #1B5E20;
            }

            @media print {
                .no-print {
                    display: none !important;
                }

                body {
                    background: #fff !important;
                    color: #000 !important;
                }

                .container {
                    background: #fff !important;
                    color: #000 !important;
                    box-shadow: none !important;
                    padding: 0 !important;
                }

                .innings-container {
                    grid-template-columns: repeat(2, 1fr);
                    gap: 5px;
                }

                table {
                    background: #fff !important;
                    color: #000 !important;
                    border: 1px solid #000 !important;
                }

                thead {
                    background: #ccc !important;
                    color: #000 !important;
                }

                td,
                th {
                    padding: 3px !important;
                }
            }

        </style>
    </head>

    <body>
        <div class="container text-center">
            <h1>Owlette Lineup Rotator</h1>
            <div class="no-print mb-3">
                <select id="inningCount" class="form-select d-inline-block" style="width: auto; margin-right: 10px;">
                    <option value="1">1 Inning</option>
                    <option value="2">2 Innings</option>
                    <option value="3">3 Innings</option>
                    <option value="4">4 Innings</option>
                    <option value="5">5 Innings</option>
                    <option value="6" selected>6 Innings</option>
                </select>
                <button class="btn btn-primary" onclick="generateInnings()">Generate Innings</button>
                <button class="btn btn-success" onclick="window.print()">Save as PDF</button>
                <a href="rotation-log.html" class="btn btn-outline-light">View Rotation Log</a>
            </div>
            <div id="inningsContainer" class="innings-container"></div>
        </div>

        <!-- SortableJS CDN -->
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
        <script>
            let positions = ['P', '1B', '2B', '3B', 'SS', 'LF', 'CF', 'RF', 'OF', 'OF'];
            let originalPlayers = ['Holden', 'Daniel', 'Emmett', 'Lennon', 'Lewis', 'Kase', 'Nick', 'Wade', 'Wyatt', 'Max'];

            function shuffle(array) {
                let arr = array.slice();
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function renderSixInnings(innings, customPositions) {
                const container = document.getElementById('inningsContainer');
                container.innerHTML = '';
                innings.forEach((lineup, idx) => {
                    const table = document.createElement('table');
                    table.className = 'table table-bordered';
                    table.innerHTML = `
                    <thead>
                        <tr><th colspan="2">Inning ${ idx + 1 }</th></tr>
                        <tr><th>Position</th><th>Player</th></tr>
                    </thead>
                    <tbody id="inning-tbody-${ idx }">
                        ${ lineup.map((item, i) => `
                            <tr data-index="${ i }">
                                <td class="editable-position" contenteditable="true">${ customPositions ? customPositions[idx][i] : positions[i] }</td>
                                <td class="draggable-player" contenteditable="true"><span class="drag-handle">${ item }</span></td>
                            </tr>
                        `).join('') }
                    </tbody>
                `;
                    container.appendChild(table);

                    // Only allow dragging by player name, keep positions fixed
                    Sortable.create(table.querySelector('tbody'), {
                        animation: 150,
                        handle: '.drag-handle',
                        draggable: 'tr',
                        onEnd: function (evt) {
                            const tbody = evt.to;
                            const newLineup = [];
                            Array.from(tbody.children).forEach((row) => {
                                const player = row.querySelector('.drag-handle').textContent;
                                newLineup.push(player);
                            });
                            innings[idx] = newLineup;
                            saveSixToLog(innings, getCurrentPositions());
                        }
                    });

                    // Add event listeners for editing positions and players
                    Array.from(table.querySelectorAll('.editable-position')).forEach((cell, i) => {
                        cell.addEventListener('blur', function () {
                            updatePositions();
                        });
                    });
                    Array.from(table.querySelectorAll('.draggable-player')).forEach((cell, i) => {
                        cell.addEventListener('blur', function () {
                            updatePlayers();
                        });
                    });
                });

                function updatePositions() {
                    const allPositions = [];
                    document.querySelectorAll('.innings-container table tbody').forEach((tbody) => {
                        const posRow = [];
                        Array.from(tbody.children).forEach((row) => {
                            posRow.push(row.children[0].textContent.trim());
                        });
                        allPositions.push(posRow);
                    });
                    saveSixToLog(innings, allPositions);
                }

                function updatePlayers() {
                    const allPlayers = [];
                    document.querySelectorAll('.innings-container table tbody').forEach((tbody) => {
                        const playerRow = [];
                        Array.from(tbody.children).forEach((row) => {
                            playerRow.push(row.querySelector('.drag-handle').textContent.trim());
                        });
                        allPlayers.push(playerRow);
                    });
                    // Update innings in memory and save
                    for (let i = 0; i < innings.length; i++) {
                        innings[i] = allPlayers[i];
                    }
                    saveSixToLog(innings, getCurrentPositions());
                }

                function getCurrentPositions() {
                    const allPositions = [];
                    document.querySelectorAll('.innings-container table tbody').forEach((tbody) => {
                        const posRow = [];
                        Array.from(tbody.children).forEach((row) => {
                            posRow.push(row.children[0].textContent.trim());
                        });
                        allPositions.push(posRow);
                    });
                    return allPositions;
                }
            }

            function generateInnings() {
                const count = parseInt(document.getElementById('inningCount').value);
                let players = [...originalPlayers];
                let innings = [];
                let usedLineups = [];
                let customPositions = null;

                for (let inning = 1; inning <= count; inning++) {
                    let valid = false;
                    let tries = 0;
                    let shuffled;
                    while (!valid && tries < 100) {
                        shuffled = shuffle(players);
                        if (!usedLineups.some(lineup => lineup.every((p, idx) => p === shuffled[idx]))) {
                            valid = true;
                            usedLineups.push([...shuffled]);
                        }
                        tries++;
                    }
                    innings.push([...shuffled]);
                }

                renderSixInnings(innings, customPositions);
                saveSixToLog(innings, null);
            }

            // Keep backward compatibility
            function generateSixInnings() {
                document.getElementById('inningCount').value = '6';
                generateInnings();
            }

            function saveSixToLog(innings, customPositions) {
                const log = JSON.parse(localStorage.getItem('rotationLog') || '[]');
                const weekData = {
                    week: log.length + 1,
                    innings: innings.map((lineup, inningIdx) =>
                        lineup.map((player, index) => ({
                            position: customPositions ? customPositions[inningIdx][index] : positions[index],
                            player
                        }))
                    )
                };
                log.push(weekData);
                localStorage.setItem('rotationLog', JSON.stringify(log));
            }

            // Generate a set on first load for user convenience
            generateSixInnings();
        </script>
    </body>

</html>
